# Filtros customizados para fail2ban
# Salvar cada bloco no arquivo correspondente em /etc/fail2ban/filter.d/

# ──────────────────────────────────────────────────────────────────
# /etc/fail2ban/filter.d/medmaestro-noscript.conf
# ──────────────────────────────────────────────────────────────────
# [Definition]
# failregex = ^<HOST>.*"(GET|POST|HEAD).*HTTP.*" (401|403|404) .*$
# ignoreregex =

# ──────────────────────────────────────────────────────────────────
# /etc/fail2ban/filter.d/medmaestro-req-limit.conf
# ──────────────────────────────────────────────────────────────────
# [Definition]
# failregex = limiting requests, excess: .* by zone .*, client: <HOST>
# ignoreregex =

# ──────────────────────────────────────────────────────────────────
# /etc/fail2ban/filter.d/medmaestro-login.conf
# ──────────────────────────────────────────────────────────────────
# Detecta POST /login com resposta 4xx (login falhou)
# [Definition]
# failregex = ^<HOST>.*"POST /login HTTP.*" 4\d\d .*$
# ignoreregex =
