# /etc/fail2ban/jail.d/medmaestro.conf
# Aplica banimentos baseados nos logs do nginx do MedMaestro.
# Reload: systemctl reload fail2ban && fail2ban-client status

[DEFAULT]
# 1h de ban por padrão; aumenta exponencialmente com bantime.increment
bantime = 1h
findtime = 10m
maxretry = 5
bantime.increment = true
bantime.factor = 2
bantime.maxtime = 7d
backend = systemd
ignoreip = 127.0.0.1/8 ::1

# ── Banimento por respostas 401/403/404 excessivas ──────────────────
# Detecta scanners e brute force genérico
[medmaestro-noscript]
enabled  = true
port     = http,https
filter   = medmaestro-noscript
logpath  = /var/log/nginx/medmaestro.access.log
maxretry = 6
findtime = 2m
bantime  = 1h

# ── Banimento por exceder rate limit do nginx ───────────────────────
# Quando nginx retorna 503 (rate limit hit), fail2ban detecta padrão
[medmaestro-req-limit]
enabled  = true
port     = http,https
filter   = medmaestro-req-limit
logpath  = /var/log/nginx/medmaestro.error.log
maxretry = 10
findtime = 2m
bantime  = 1h

# ── Banimento por tentativas de login falhadas ──────────────────────
# Detecta requests POST /login que retornaram 4xx
[medmaestro-login]
enabled  = true
port     = http,https
filter   = medmaestro-login
logpath  = /var/log/nginx/medmaestro.access.log
maxretry = 5
findtime = 5m
bantime  = 24h

# ── SSH (proteção básica do host) ───────────────────────────────────
[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = %(sshd_log)s
maxretry = 3
bantime  = 24h
