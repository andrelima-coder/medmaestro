# /etc/nginx/sites-available/medmaestro
# Symlink: ln -s /etc/nginx/sites-available/medmaestro /etc/nginx/sites-enabled/
# Test:    nginx -t && systemctl reload nginx
#
# Pré-requisitos:
#   - Container/processo Next.js escutando em 127.0.0.1:3000
#   - Certbot instalado: certbot --nginx -d medmaestro.SEUDOMINIO.com.br
#   - DNS A apontando para o IP público da VPS

# ──────────────────────────────────────────────────────────────────────
# Rate limit zones (compartilhadas por todos os server blocks)
# limit_req_zone usa shared memory; 10m comporta ~160k IPs únicos.
# ──────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=mm_global:10m  rate=60r/s;
limit_req_zone $binary_remote_addr zone=mm_login:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=mm_api:10m     rate=20r/s;
limit_req_zone $binary_remote_addr zone=mm_worker:10m  rate=2r/s;

# Limita conexões concorrentes — slowloris/exhaustion mitigation
limit_conn_zone $binary_remote_addr zone=mm_conn:10m;

# Map para detectar bots (opcional — pode ser usado em fail2ban)
map $http_user_agent $is_bad_bot {
  default                    0;
  ~*(curl|wget|python-)      0;   # útil em healthchecks/scripts internos
  ~*(scanbot|nikto|sqlmap|nmap)  1;
}

# ──────────────────────────────────────────────────────────────────────
# Redirect HTTP → HTTPS (Certbot mantém este bloco automaticamente)
# ──────────────────────────────────────────────────────────────────────

server {
  listen 80;
  listen [::]:80;
  server_name medmaestro.SEUDOMINIO.com.br;

  # Para Let's Encrypt renovar
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ──────────────────────────────────────────────────────────────────────
# HTTPS principal
# ──────────────────────────────────────────────────────────────────────

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name medmaestro.SEUDOMINIO.com.br;

  # ── TLS (Certbot popula estes paths)
  ssl_certificate     /etc/letsencrypt/live/medmaestro.SEUDOMINIO.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/medmaestro.SEUDOMINIO.com.br/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # ── Segurança e endurecimento ──────────────────────────────────────

  # Bloqueia bad bots cedo (antes de chegar no Next)
  if ($is_bad_bot) { return 444; }

  # Limita tamanho do body de upload (PDFs de prova ~10MB; folga para 50MB
  # do experimental.serverActions.bodySizeLimit)
  client_max_body_size 60m;

  # Slowloris / DoS lento
  client_body_timeout 30s;
  client_header_timeout 10s;
  send_timeout 30s;
  keepalive_timeout 65s;

  # Limita conexões concorrentes por IP
  limit_conn mm_conn 30;

  # Esconde versão do nginx
  server_tokens off;

  # ── Headers de segurança ───────────────────────────────────────────
  # CSP/HSTS são também emitidos pelo Next.js em next.config.ts;
  # mantemos aqui em add_header com `always` para garantir em respostas
  # de erro (4xx/5xx), onde a app pode não rodar middleware.

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ── Rate limit global (anti-DoS)
  limit_req zone=mm_global burst=120 nodelay;

  # ── Login com rate limit dedicado (10/min por IP)
  location = /login {
    limit_req zone=mm_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/proxy_params;
  }

  # ── Endpoint do worker — só permite IPs do GitHub Actions ou cron interno
  # IPs do GitHub Actions: https://api.github.com/meta (campo "actions")
  # Para simplificar, aceite com Bearer token + rate baixo
  location = /api/worker/tick {
    limit_req zone=mm_worker burst=2 nodelay;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/proxy_params;
  }

  # ── /api — rate mais alto (20 r/s)
  location /api/ {
    limit_req zone=mm_api burst=40 nodelay;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/proxy_params;
  }

  # ── Bloqueia caminhos comumente probados por scanners
  location ~* /\.(git|env|svn|htaccess) {
    deny all;
    return 404;
  }
  location ~* (wp-admin|phpmyadmin|\.php$) {
    deny all;
    return 404;
  }

  # ── Tudo mais → Next.js
  location / {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/proxy_params;
  }

  # Logs separados para análise (fail2ban consome estes)
  access_log /var/log/nginx/medmaestro.access.log combined;
  error_log  /var/log/nginx/medmaestro.error.log warn;
}

